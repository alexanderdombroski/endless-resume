<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Rounded square background, edge-to-edge like a standard app/favicon -->
  <rect x="0" y="0" width="128" height="128" rx="28" fill="#1E293B"/>

  <!-- Document body: more square proportions, centered on canvas -->
  <path d="M32 24 H82 L96 38 V104 H32 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2.4" stroke-linejoin="round"/>
  <!-- Folded corner -->
  <path d="M82 24 L96 38 H85 a3 3 0 0 1 -3 -3 Z" fill="#CBD5E1" stroke="#FFFFFF" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- Text lines (top) -->
  <rect x="40" y="42" width="24" height="3.4" rx="1.7" fill="#1E293B" opacity="0.45"/>
  <rect x="40" y="50" width="17" height="3.4" rx="1.7" fill="#1E293B" opacity="0.3"/>

  <!-- Text lines (bottom) -->
  <rect x="40" y="78" width="23" height="3.4" rx="1.7" fill="#1E293B" opacity="0.3"/>
  <rect x="40" y="86" width="15" height="3.4" rx="1.7" fill="#1E293B" opacity="0.2"/>

  <!-- Infinity symbol, centered on the canvas -->
  <g transform="translate(64,64)">
    <path d="M -16 0
             C -16 -9.6, -3.1 -9.6, 0 0
             C 3.1 9.6, 16 9.6, 16 0
             C 16 -9.6, 3.1 -9.6, 0 0
             C -3.1 9.6, -16 9.6, -16 0
             Z"
          fill="none" stroke="#1E293B" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
